spring.application.name=ias-firebase
spring.security.user.name=admin
spring.security.user.password=secret123
server.address=0.0.0.0

# Firebase Admin: path to service account JSON key (in project root)
app.firebase.service-account-path=serviceAccountKey.json

# RBAC: bootstrap first admin by Firebase UID (optional). First user to log in becomes admin if empty.
# app.roles.admin-uids=your-firebase-uid-here
app.roles.file=data/user-roles.json

# Local file storage (used by /api/files/upload and /api/files/{id}/download)
app.files.storage-dir=uploads


spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/access_control?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
